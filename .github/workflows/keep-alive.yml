name: Keep PeerJS Server Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Connect and disconnect PeerJS
        run: |
          npm install peerjs
          node -e "
            const { Peer } = require('peerjs');
            const peer = new Peer('keep-alive-probe', {
              host: 'party-quiz-peerjs.onrender.com',
              port: 443,
              path: '/',
              secure: true
            });
            peer.on('open', (id) => {
              console.log('Connected:', id);
              peer.destroy();
              process.exit(0);
            });
            peer.on('error', (e) => {
              console.error('Error:', e.message);
              process.exit(1);
            });
            setTimeout(() => { console.error('Timeout'); process.exit(1); }, 15000);
          "